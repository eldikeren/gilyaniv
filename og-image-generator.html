<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #333;
            font-family: 'Heebo', Arial, sans-serif;
        }
        .og-image {
            width: 1200px;
            height: 630px;
            background: #0b1018;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 4px solid #c9a84c33;
            position: relative;
        }
        .og-image::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid #c9a84c44;
            pointer-events: none;
        }
        .title {
            font-size: 64px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 30px;
            direction: rtl;
        }
        .subtitle {
            font-size: 36px;
            font-weight: 500;
            color: #c9a84c;
            margin-bottom: 40px;
            direction: rtl;
        }
        .contact {
            font-size: 28px;
            color: #8896a8;
            direction: rtl;
        }
        .instructions {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            max-width: 300px;
            font-size: 14px;
            line-height: 1.6;
        }
        .instructions h3 {
            margin-bottom: 10px;
            color: #333;
        }
        .instructions ol {
            padding-left: 20px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="instructions">
        <h3>Instructions:</h3>
        <ol>
            <li>Open this file in a browser</li>
            <li>Take a screenshot of the dark box (1200x630)</li>
            <li>Save as images/og-share.jpg</li>
            <li>Or use browser dev tools to screenshot at exact dimensions</li>
        </ol>
    </div>

    <div class="og-image">
        <div class="title">משרד עו״ד יניב גיל ושות׳</div>
        <div class="subtitle">דיני משפחה · גירושין · ירושות · חדלות פירעון</div>
        <div class="contact">054-8184581 | תל אביב</div>
    </div>
</body>
</html>
