name: Fix structured data
on:
  push:
    paths:
      - "trigger-fix.txt"
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix JSON-LD structured data
        run: |
          cat > /tmp/fix.py << 'SCRIPT'
import os, re, glob
report = []
fixed_count = 0
GERSH = chr(0x05F4)
BSLASH_U0022 = chr(92) + 'u0022'
for f in sorted(glob.glob('*.html')):
    with open(f, 'r', encoding='utf-8') as fh:
        c = fh.read()
    orig = c
    if BSLASH_U0022 in c:
        c = c.replace(BSLASH_U0022, GERSH)
    faq = list(re.finditer(r'<script[^>]*application/ld.json[^>]*>[^<]*?FAQPage[^<]*?</script>', c, re.DOTALL))
    if len(faq) > 1:
        report.append(f'{f}: removing {len(faq)-1} dup FAQ blocks')
        for m in reversed(faq[1:]):
            c = c[:m.start()] + c[m.end():]
    if c != orig:
        with open(f, 'w', encoding='utf-8') as fh:
            fh.write(c)
        fixed_count += 1
        report.append(f'{f}: fixed')
print(f'Fixed {fixed_count} files')
for r in report:
    print(r)
SCRIPT
          python3 /tmp/fix.py
      - name: Commit changes
        run: |
          rm -f trigger-fix.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Fix structured data: JSON-LD quotes and duplicate FAQ blocks"
          git push
