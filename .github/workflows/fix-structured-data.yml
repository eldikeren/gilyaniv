name: Fix structured data
on:
  push:
    paths:
      - "trigger-fix.txt"
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix JSON-LD structured data
        run: |
          cat > /tmp/fix.py << 'SCRIPT'
import os, re, glob
report = []
fixed = 0
GERSH = "\u05F4"
for f in sorted(glob.glob("*.html")):
    with open(f, "r", encoding="utf-8") as fh:
        c = fh.read()
    orig = c
    # Fix \u0022 in JSON-LD (escaped quote -> gershayim)
    c = c.replace("\\u0022", GERSH)
    # Remove duplicate FAQPage JSON-LD blocks (keep first)
    faq = list(re.finditer(r'<script[^>]*application/ld.json[^>]*>[^<]*?FAQPage[^<]*?</script>', c, re.DOTALL))
    if len(faq) > 1:
        report.append(f"{f}: removing {len(faq)-1} dup FAQ blocks")
        for m in reversed(faq[1:]):
            c = c[:m.start()] + c[m.end():]
    if c != orig:
        with open(f, "w", encoding="utf-8") as fh:
            fh.write(c)
        fixed += 1
        report.append(f"{f}: fixed")
print(f"Fixed {fixed} files")
for r in report:
    print(r)
SCRIPT
          python3 /tmp/fix.py
      - name: Cleanup trigger and commit
        run: |
          rm -f trigger-fix.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Fix structured data: JSON-LD quotes and duplicate FAQ blocks"
          git push
