name: Fix structured data
on:
  push:
    paths:
      - "trigger-fix.txt"
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix H1 tags on new pages
        run: |
          cat > /tmp/fix_h1.py << 'SCRIPT'
          import re
          
          fixes = {
              'heskem-mamon-dugma.html': {
                  'old_h1': chr(0x05D4) + chr(0x05E1) + chr(0x05DB) + chr(0x05DD) + ' ' + chr(0x05DE) + chr(0x05DE) + chr(0x05D5) + chr(0x05DF) + ' ' + chr(0x05D1) + chr(0x05D9) + chr(0x05E9) + chr(0x05E8) + chr(0x05D0) + chr(0x05DC),
                  'new_h1': chr(0x05D3) + chr(0x05D5) + chr(0x05D2) + chr(0x05DE) + chr(0x05D4) + ' ' + chr(0x05DC) + chr(0x05D4) + chr(0x05E1) + chr(0x05DB) + chr(0x05DD) + ' ' + chr(0x05DE) + chr(0x05DE) + chr(0x05D5) + chr(0x05DF) + ' - ' + chr(0x05EA) + chr(0x05D1) + chr(0x05E0) + chr(0x05D9) + chr(0x05EA) + ' ' + chr(0x05D5) + chr(0x05D3) + chr(0x05D5) + chr(0x05D2) + chr(0x05DE) + chr(0x05D0) + chr(0x05D5) + chr(0x05EA) + ' ' + chr(0x05DE) + chr(0x05E2) + chr(0x05E9) + chr(0x05D9) + chr(0x05D5) + chr(0x05EA) + ' 2026'
              },
              'heskem-mamon-leachar-nisuin.html': {
                  'old_h1': chr(0x05D4) + chr(0x05E1) + chr(0x05DB) + chr(0x05DD) + ' ' + chr(0x05DE) + chr(0x05DE) + chr(0x05D5) + chr(0x05DF) + ' ' + chr(0x05D1) + chr(0x05D9) + chr(0x05E9) + chr(0x05E8) + chr(0x05D0) + chr(0x05DC),
                  'new_h1': chr(0x05D4) + chr(0x05E1) + chr(0x05DB) + chr(0x05DD) + ' ' + chr(0x05DE) + chr(0x05DE) + chr(0x05D5) + chr(0x05DF) + ' ' + chr(0x05DC) + chr(0x05D0) + chr(0x05D7) + chr(0x05E8) + ' ' + chr(0x05E0) + chr(0x05D9) + chr(0x05E9) + chr(0x05D5) + chr(0x05D0) + chr(0x05D9) + chr(0x05DF) + ' - ' + chr(0x05D4) + chr(0x05D0) + chr(0x05DD) + ' ' + chr(0x05D0) + chr(0x05E4) + chr(0x05E9) + chr(0x05E8) + ' ' + chr(0x05D5) + chr(0x05DE) + chr(0x05EA) + chr(0x05D9) + ' ' + chr(0x05DB) + chr(0x05D3) + chr(0x05D0) + chr(0x05D9) + '? 2026'
              }
          }
          
          for fname, info in fixes.items():
              try:
                  with open(fname, 'r', encoding='utf-8') as f:
                      content = f.read()
                  old_pattern = r'<h1[^>]*>[^<]*' + re.escape(info['old_h1']) + r'[^<]*</h1>'
                  new_tag = '<h1 class=' + chr(34) + 'text-4xl md:text-5xl font-bold mb-6 leading-tight' + chr(34) + '>' + info['new_h1'] + '</h1>'
                  new_content = re.sub(old_pattern, new_tag, content)
                  if new_content != content:
                      with open(fname, 'w', encoding='utf-8') as f:
                          f.write(new_content)
                      print(f'Fixed H1 in {fname}')
                  else:
                      print(f'No match in {fname}')
              except Exception as e:
                  print(f'Error on {fname}: {e}')
          SCRIPT
          python3 /tmp/fix_h1.py
      - name: Commit changes
        run: |
          rm -f trigger-fix.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Fix H1 tags on heskem-mamon-dugma and heskem-mamon-leachar-nisuin"
          git push
