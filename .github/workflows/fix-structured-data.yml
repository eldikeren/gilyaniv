name: Fix sitemap
on:
  push:
    paths:
      - "trigger-fix.txt"
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update CSS cache buster version
        run: |
          sed -i 's/tailwind.css?v=20260321d/tailwind.css?v=20260416a/g' *.html
          echo "Updated $(grep -rl 'v=20260416a' *.html | wc -l) files"
      - name: Commit changes
        run: |
          rm -f trigger-fix.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Bust CSS cache: update tailwind.css version to 20260416a"
          git push
