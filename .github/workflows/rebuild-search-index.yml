name: Rebuild Search Index

on:
  push:
    branches: [main]
    paths:
      - '*.html'
      - 'blog-articles/*.html'
  workflow_dispatch:

jobs:
  rebuild-search:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild search index
        run: node scripts/build-search-index.js

      - name: Commit updated search index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/search-index.json
          git diff --staged --quiet || git commit -m "chore: auto-rebuild search index [skip ci]"
          git pull --rebase origin main
          git push
