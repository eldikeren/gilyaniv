name: Remove AI Artifacts (em-dashes)
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Remove em-dashes
        run: |
          EMDASH=$'\xe2\x80\x94'
          count=0
          find . -name '*.html' -not -path './.git/*' -print0 | while IFS= read -r -d '' f; do
            if grep -q "$EMDASH" "$f"; then
              sed -i "s/$EMDASH/-/g" "$f"
              echo "Fixed: $f"
              count=$((count+1))
            fi
          done
          echo "Done"
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Remove em-dashes (AI artifact) from all HTML pages"
            git push
          fi
