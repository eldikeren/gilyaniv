name: Clean AI Artifacts and Replace Email
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Remove em-dashes (AI artifact)
        run: |
          find . -name '*.html' -not -path './.git/*' -exec perl -pi -e 's/\x{2014}/-/g' {} +
          echo "Em-dash replacement complete"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Remove em-dashes (AI artifact) from all HTML pages"
            git push
          fi
