name: Broken links report
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Generate report
        run: |
          cat > /tmp/report.py << 'PYEOF'
          import re, glob
          existing = set()
          for f in glob.glob("*.html"):
              existing.add(f.replace(".html", ""))
          broken = {}
          for f in glob.glob("*.html"):
              try:
                  content = open(f, encoding="utf-8").read()
                  links = re.findall(r"href=[\x22\x27]/?([a-z0-9][a-z0-9-]*?)(?:\.html)?[\x22\x27]", content)
                  for link in links:
                      slug = link.strip("/")
                      if slug and slug not in existing and not slug.startswith("http") and not slug.startswith("tel") and not slug.startswith("mailto") and len(slug) > 2:
                          if slug not in broken:
                              broken[slug] = 0
                          broken[slug] += 1
              except:
                  pass
          report = f"Broken links report\nTotal HTML files: {len(existing)}\n\n"
          for slug, count in sorted(broken.items(), key=lambda x: -x[1])[:50]:
              report += f"MISSING: {slug}.html ({count} references)\n"
          open("broken-links-report.txt", "w").write(report)
          print(report)
          PYEOF
          python3 /tmp/report.py
      - name: Commit report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add broken-links-report.txt
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Add broken links report"
            git push
          fi
