name: Replace phone numbers
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  replace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Replace phone numbers with 054-6003399
        run: |
          echo "Replacing 03-6092414..."
          find . -name "*.html" -not -path "./.git/*" -exec grep -l "03-6092414" {} \; | wc -l
          find . -name "*.html" -not -path "./.git/*" -exec sed -i "s/03-6092414/054-6003399/g" {} +
          echo "Replacing 03-6092413..."
          find . -name "*.html" -not -path "./.git/*" -exec grep -l "03-6092413" {} \; | wc -l
          find . -name "*.html" -not -path "./.git/*" -exec sed -i "s/03-6092413/054-6003399/g" {} +
          echo "Replacing 036092414 (no dash)..."
          find . -name "*.html" -not -path "./.git/*" -exec sed -i "s/036092414/0546003399/g" {} +
          echo "Replacing 036092413 (no dash)..."
          find . -name "*.html" -not -path "./.git/*" -exec sed -i "s/036092413/0546003399/g" {} +
          echo "Done"
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Replace old phone numbers with 054-6003399 across all pages"
            git push
          fi
