name: Fix HTML issues
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Remove garbage text before DOCTYPE
        run: |
          find . -name "*.html" -not -path "./.git/*" -print0 | while IFS= read -r -d "" f; do
            if head -c 20 "$f" | grep -qv "<!DOCTYPE\|<!doctype\|<html\|<!--"; then
              DOCTYPE_POS=$(grep -bo "<!DOCTYPE\|<!doctype" "$f" | head -1 | cut -d: -f1)
              if [ -n "$DOCTYPE_POS" ] && [ "$DOCTYPE_POS" -gt 0 ]; then
                tail -c +$((DOCTYPE_POS + 1)) "$f" > "$f.tmp" && mv "$f.tmp" "$f"
                echo "Fixed garbage in: $f (removed $DOCTYPE_POS bytes)"
              fi
            fi
          done
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Remove garbage text before DOCTYPE in HTML files"
            git push
          fi
