name: Remove AI Artifacts (em-dashes)
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Remove em-dashes
        run: |
          python3 -c "
          import glob
          count = 0
          for f in glob.glob('**/*.html', recursive=True):
            try:
              t = open(f, encoding='utf-8').read()
              if chr(8212) in t:
                open(f, 'w', encoding='utf-8').write(t.replace(chr(8212), '-'))
                count += 1
                print('Fixed:', f)
            except Exception as e:
              print('Error:', f, e)
          print('Total fixed:', count)
          "
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Remove em-dashes (AI artifact) from all HTML pages"
            git push
          fi
