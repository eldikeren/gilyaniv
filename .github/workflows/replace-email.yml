name: Remove AI Artifacts (em-dashes)
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Replace mdash entities and literal em-dashes
        run: |
          echo "Replacing &mdash; HTML entities..."
          find . -name "*.html" -not -path "./.git/*" -exec grep -l "&mdash;" {} \; | while read f; do
            sed -i "s/&mdash;/-/g" "$f"
            echo "Fixed entity in: $f"
          done
          echo "Replacing literal em-dash characters..."
          python3 -c "
          import glob
          for f in glob.glob(chr(42)+chr(42)+chr(47)+chr(42)+chr(46)+chr(104)+chr(116)+chr(109)+chr(108), recursive=True):
            try:
              t=open(f).read()
              if chr(8212) in t: open(f,chr(119)).write(t.replace(chr(8212),chr(45)));print(chr(70)+chr(105)+chr(120)+chr(101)+chr(100)+chr(58),f)
            except: pass
          "
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Remove em-dash entities and literals from HTML pages"
            git push
          fi
