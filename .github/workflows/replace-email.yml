name: Fix structured data issues
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix JSON-LD and meta tag quote issues
        run: |
          cat > /tmp/fix_jsonld.py << 'SCRIPT'
import os, re, glob, json

report = []
files_fixed = 0

for f in sorted(glob.glob("*.html")):
    with open(f, "r", encoding="utf-8") as fh:
        content = fh.read()
    
    original = content
    changes = []
    
    # 1. Fix JSON-LD: replace \u0022 with Hebrew gershayim
    if "\\u0022" in content:
        content = content.replace("\\u0022", "\u05F4")
        changes.append("fixed \\u0022 -> gershayim in JSON-LD")
    
    # 2. Fix JSON-LD: replace \" followed by Hebrew dalet with gershayim+dalet
    # Pattern: inside JSON-LD blocks, fix escaped quotes before Hebrew chars
    def fix_jsonld_quotes(m):
        block = m.group(0)
        # Replace \" before Hebrew dalet (\u05D3) with gershayim
        fixed = block.replace('\\\"\u05D3', '\u05F4\u05D3')
        # Also handle the pattern where it shows as \"d in raw
        return fixed
    
    jsonld_pattern = r'<script[^>]*type=["']application/ld\+json["'][^>]*>.*?</script>'
    new_content = re.sub(jsonld_pattern, fix_jsonld_quotes, content, flags=re.DOTALL)
    if new_content != content:
        content = new_content
        changes.append("fixed escaped quotes in JSON-LD blocks")
    
    # 3. Count FAQPage JSON-LD blocks
    faq_blocks = re.findall(r'<script[^>]*type=["']application/ld\+json["'][^>]*>[^<]*FAQPage[^<]*</script>', content, re.DOTALL)
    if len(faq_blocks) > 1:
        changes.append(f"DUPLICATE FAQ: {len(faq_blocks)} FAQPage blocks found")
        # Keep only the first FAQ block, remove subsequent ones
        first_found = False
        def remove_dup_faq(m):
            nonlocal first_found
            if "FAQPage" in m.group(0):
                if not first_found:
                    first_found = True
                    return m.group(0)
                else:
                    return ""
            return m.group(0)
        content = re.sub(r'<script[^>]*type=["']application/ld\+json["'][^>]*>.*?</script>', remove_dup_faq, content, flags=re.DOTALL)
        changes.append("removed duplicate FAQ blocks")
    
    # 4. Fix meta description with broken quotes
    # Pattern: content="...text..."text..." -> content="...text&quot;text..."
    meta_pattern = r'<meta[^>]*(?:name=["']description["']|property=["']og:description["'])[^>]*>'
    metas = re.findall(meta_pattern, content)
    for meta in metas:
        if meta.count('"') > 4:
            changes.append(f"META QUOTE ISSUE: {meta[:100]}...")
    
    if content != original:
        with open(f, "w", encoding="utf-8") as fh:
            fh.write(content)
        files_fixed += 1
    
    if changes:
        report.append(f"{f}: {'; '.join(changes)}")

with open("structured-data-report.txt", "w") as fh:
    fh.write(f"Files fixed: {files_fixed}\n\n")
    fh.write("\n".join(report) if report else "No issues found")

print(f"Fixed {files_fixed} files")
print("\n".join(report[:30]))
SCRIPT
          python3 /tmp/fix_jsonld.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Fix structured data: JSON-LD quotes and duplicate FAQ blocks"
          git push
