name: Scan broken links and fix fonts
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Scan and fix
        run: |
          cat > /tmp/scan.py << 'PYEOF'
          import re, glob, os
          existing = set()
          for f in glob.glob("*.html"):
              existing.add(f.replace(".html", ""))
          print("Total HTML files:", len(existing))
          broken = {}
          for f in glob.glob("*.html"):
              try:
                  content = open(f, encoding="utf-8").read()
                  links = re.findall(r"href=[\x22\x27]/([a-z0-9-]+)", content)
                  for link in links:
                      slug = link.strip("/").replace(".html", "")
                      if slug and slug not in existing:
                          if slug not in broken:
                              broken[slug] = 0
                          broken[slug] += 1
              except:
                  pass
          print("Broken internal links:")
          for slug, count in sorted(broken.items(), key=lambda x: -x[1]):
              print(f"  MISSING: {slug}.html ({count} refs)")
          fix = "<style>body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;}</style>"
          fc = 0
          for f in glob.glob("*.html"):
              try:
                  c = open(f, encoding="utf-8").read()
                  if "font-smoothing" not in c and "</head>" in c:
                      c = c.replace("</head>", fix + "</head>")
                      open(f, "w", encoding="utf-8").write(c)
                      fc += 1
              except:
                  pass
          print(f"Font smoothing added to {fc} pages")
          PYEOF
          python3 /tmp/scan.py
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add font smoothing for clarity across all pages"
            git push
          fi
