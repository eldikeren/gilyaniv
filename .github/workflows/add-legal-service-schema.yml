name: Add LegalService Schema to All Pages

on:
  workflow_dispatch:

jobs:
  add-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Run add-legal-service-schema script
        run: node scripts/add-legal-service-schema.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "fix: add LegalService schema to all pages missing it [skip ci]"
          git pull --rebase origin main
          git push
