<script>
        // Duns seal: show on load, hide on scroll down, show on scroll up
        (function() {
            var lastScroll = 0;
            function initSeal() {
                var seal = document.querySelector('.duns-seal-link');
                if (!seal) return;
                window.addEventListener('scroll', function() {
                    var cur = window.scrollY;
                    if (cur > lastScroll && cur > 80) {
                        seal.classList.add('seal-hidden');
                    } else if (cur < lastScroll) {
                        seal.classList.remove('seal-hidden');
                    }
                    lastScroll = cur;
                });
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initSeal);
            } else {
                initSeal();
            }
        })();
</script>
<script src="js/scroll-arrow.js" defer></script>
